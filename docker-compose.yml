version: '3.8'
services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d todo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - '3001:3001'
    depends_on:
        postgres:
            condition: service_healthy
    environment:
      - DB_NAME=todo_db
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - PORT=3001
    command: >
      sh -c "npx sequelize-cli db:migrate && npx sequelize-cli db:seed:all && node index.js"


  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
